<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anchored Speaking Agent</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="lesson-panel">
        <div class="brand-row">
          <div>
            <p class="eyebrow">Anchored Speaking</p>
            <h1>Text-Anchored Speaking Practice</h1>
          </div>
          <span id="apiStatus" class="status-pill">Checking</span>
        </div>

        <label class="field-label" for="lessonSelect">Practice Text</label>
        <select id="lessonSelect" class="input"></select>

        <div class="anchor-box">
          <div class="anchor-head">
            <div>
              <h2 id="lessonTitle">Loading...</h2>
              <span id="lessonLevel" class="level-pill"></span>
            </div>
            <button id="editLessonBtn" class="ghost-btn" type="button">Edit</button>
          </div>
          <textarea id="anchorText" class="anchor-text" rows="9"></textarea>
        </div>

        <div class="keyword-section">
          <label class="field-label" for="keywordInput">Keywords</label>
          <input id="keywordInput" class="input" placeholder="puppy, school gate, owner" />
          <div id="keywordChips" class="chips"></div>
        </div>

        <div class="patterns">
          <label class="field-label" for="patternsInput">Target Sentence Patterns</label>
          <textarea id="patternsInput" class="input small-area" rows="3"></textarea>
        </div>
      </section>

      <section class="practice-panel">
        <div class="practice-top">
          <div>
            <p class="eyebrow">Live Tutor</p>
            <h2 id="roleName">Miss Emma</h2>
          </div>
          <div id="timer" class="timer">00:00</div>
        </div>

        <div class="role-grid" id="roleGrid"></div>

        <div class="child-row">
          <label class="field-label" for="childName">Child Name</label>
          <input id="childName" class="input" placeholder="Enter learner name" maxlength="40" />
        </div>

        <div class="voice-row">
          <label class="field-label" for="voiceSelect">Tutor Voice</label>
          <select id="voiceSelect" class="input">
            <option value="marin">Marin - natural</option>
            <option value="alloy">Alloy - balanced</option>
            <option value="verse">Verse - bright</option>
            <option value="aria">Aria - clear</option>
            <option value="coral">Coral - warm</option>
            <option value="sage">Sage - calm</option>
            <option value="shimmer">Shimmer - gentle</option>
          </select>
        </div>

        <div class="call-zone">
          <div class="avatar" id="avatar">E</div>
          <div class="call-copy">
            <h3 id="callState">Ready</h3>
            <p id="callHint">Choose a text, role, and voice. Then start a realtime speaking session.</p>
          </div>
        </div>

        <div class="answer-box">
          <label class="field-label" for="childMessage">Child Answer</label>
          <textarea id="childMessage" class="input answer-input" rows="4" placeholder="Type your answer in English..."></textarea>
          <div class="answer-actions">
            <button id="listenBtn" class="ghost-btn" type="button">Browser Dictation</button>
            <button id="sendBtn" class="primary-btn" type="button" disabled>Send</button>
          </div>
        </div>

        <div class="controls">
          <button id="startBtn" class="primary-btn" type="button">Start Realtime Speaking</button>
          <button id="stopBtn" class="danger-btn" type="button" disabled>Finish and Report</button>
        </div>

        <audio id="remoteAudio" autoplay></audio>
      </section>

      <section class="insight-panel">
        <div class="tabs">
          <button class="tab active" data-tab="transcript" type="button">Transcript</button>
          <button class="tab" data-tab="report" type="button">Report</button>
        </div>

        <div id="transcriptView" class="tab-view active">
          <div id="transcript" class="transcript"></div>
        </div>

        <div id="reportView" class="tab-view">
          <div id="report" class="report-empty">Finish a practice session to generate a speaking report.</div>
        </div>
      </section>
    </main>

    <template id="messageTemplate">
      <article class="message">
        <div class="message-role"></div>
        <p class="message-text"></p>
      </article>
    </template>

    <script src="/app.js?v=openai-calls-realtime-20260613-7"></script>
  </body>
</html>
