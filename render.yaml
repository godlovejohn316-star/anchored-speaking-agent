services:
  - type: web
    name: anchored-speaking-agent
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_REALTIME_MODEL
        value: gpt-realtime-2
      - key: OPENAI_TEXT_MODEL
        value: gpt-5-mini
      - key: OPENAI_VOICE
        value: alloy
      - key: PRACTICE_MAX_MINUTES
        value: 8
    disk:
      name: anchored-speaking-agent-data
      mountPath: /var/data
      sizeGB: 1
