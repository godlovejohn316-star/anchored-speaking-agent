services:
  - type: web
    name: anchored-speaking-agent
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /tmp/anchored-speaking-agent
      - key: AI_PROVIDER
        value: openai-realtime
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_API_BASE
        value: https://api.zyaihub.com/v1
      - key: OPENAI_REALTIME_MODEL
        value: gpt-realtime-2
      - key: OPENAI_REALTIME_TRANSPORT
        value: websocket
      - key: OPENAI_REALTIME_WS_URL
        sync: false
      - key: OPENAI_REALTIME_SESSION_MODE
        value: sdp-proxy
      - key: OPENAI_TEXT_MODEL
        value: gpt-4o
      - key: OPENAI_VOICE
        value: alloy
      - key: PRACTICE_MAX_MINUTES
        value: 8
